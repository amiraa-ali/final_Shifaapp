$kind: http-request
name: Server Health
method: GET
url: '{{baseUrl}}/health'
order: 1000
scripts: 
  - type: afterResponse
    code: |-
    pm.test('Server is healthy', () => pm.expect(pm.response.code).to.equal(200));
    pm.test('Response has success field', () => pm.expect(pm.response.json().success).to.be.true);
    language: text/javascript

