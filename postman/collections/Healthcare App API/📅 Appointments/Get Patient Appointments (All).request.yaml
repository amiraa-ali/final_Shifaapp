$kind: http-request
name: Get Patient Appointments (All)
method: GET
url: '{{baseUrl}}/api/appointments/patient?filter=all&page=1&limit=10'
order: 5000
headers: 
  - key: Authorization
    value: 'Bearer {{authToken}}'

queryParams: 
  - key: filter
    value: all
  - key: page
    value: 1
  - key: limit
    value: 10

