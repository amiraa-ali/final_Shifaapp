$kind: http-request
name: Cancel Appointment
method: PUT
url: '{{baseUrl}}/api/appointments/{{appointmentId}}/cancel'
order: 11000
headers: 
  - key: Content-Type
    value: application/json
  - key: Authorization
    value: 'Bearer {{authToken}}'

body: 
  type: json
  content: |-
    {
      "cancelReason": "Patient requested cancellation due to schedule conflict"
    }

