$kind: http-request
name: Register Doctor
method: POST
url: '{{baseUrl}}/api/auth/register'
order: 1000
headers: 
  - key: Content-Type
    value: application/json

body: 
  type: json
  content: |-
    {
      "name": "Dr. Ahmed Hassan",
      "email": "doctor@healthcare.com",
      "password": "password123",
      "role": "doctor"
    }

scripts: 
  - type: afterResponse
    code: |-
    if (pm.response.code === 201) {
      const res = pm.response.json();
      pm.collectionVariables.set('authToken', res.data.token);
      pm.collectionVariables.set('doctorId', res.data.user._id);
      pm.test('Registration successful', () => pm.expect(res.success).to.be.true);
      pm.test('Token received', () => pm.expect(res.data.token).to.be.a('string'));
    }
    language: text/javascript

