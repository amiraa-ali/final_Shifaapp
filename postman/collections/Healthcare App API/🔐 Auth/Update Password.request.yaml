$kind: http-request
name: Update Password
method: PUT
url: '{{baseUrl}}/api/auth/update-password'
order: 6000
headers: 
  - key: Content-Type
    value: application/json
  - key: Authorization
    value: 'Bearer {{authToken}}'

body: 
  type: json
  content: |-
    {
      "currentPassword": "password123",
      "newPassword": "newpassword456"
    }

